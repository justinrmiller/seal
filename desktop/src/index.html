<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E2E Encrypted Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .connect-box {
            background: #1e1e2e;
            padding: 2rem;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            text-align: center;
        }
        .connect-box h1 { color: #7c8aff; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .connect-box p { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
        .connect-box input {
            width: 100%;
            padding: 0.7rem;
            margin-bottom: 1rem;
            border: 1px solid #333;
            border-radius: 8px;
            background: #16162a;
            color: #e0e0e0;
            font-size: 0.95rem;
            text-align: center;
        }
        .connect-box input:focus { outline: none; border-color: #7c8aff; }
        .connect-box button {
            width: 100%;
            padding: 0.7rem;
            border: none;
            border-radius: 8px;
            background: #7c8aff;
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .connect-box button:hover { background: #6b79ee; }
        .error { color: #ff6b6b; font-size: 0.8rem; margin-top: 0.5rem; min-height: 1.2rem; }
    </style>
</head>
<body>
    <div class="connect-box">
        <h1>&#128274; E2E Encrypted Chat</h1>
        <p>Desktop client — connect to your chat server</p>
        <input type="text" id="server-url" value="http://localhost:8000" placeholder="Server URL">
        <button id="btn-connect">Connect</button>
        <p class="error" id="connect-error"></p>
    </div>
    <script>
        const savedUrl = localStorage.getItem("e2e_server_url");
        if (savedUrl) document.getElementById("server-url").value = savedUrl;

        document.getElementById("btn-connect").onclick = async () => {
            const url = document.getElementById("server-url").value.trim().replace(/\/+$/, "");
            if (!url) return;
            try {
                const res = await fetch(url + "/api/users?token=test");
                // Even a 401 means the server is reachable
                localStorage.setItem("e2e_server_url", url);
                window.location.href = url;
            } catch (e) {
                document.getElementById("connect-error").textContent =
                    "Cannot reach server. Make sure it's running.";
            }
        };

        document.getElementById("server-url").addEventListener("keydown", (e) => {
            if (e.key === "Enter") document.getElementById("btn-connect").click();
        });
    </script>
</body>
</html>
