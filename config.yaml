app:
  title: "Seal"
  host: "0.0.0.0"
  port: 8000

database:
  # Local filesystem path (relative to the project root) or an object-store URI.
  # Object storage examples:
  #   path: "s3://my-bucket/chat.lance"    # AWS S3 / S3-compatible (MinIO, R2, LocalStack)
  #   path: "gs://my-bucket/chat.lance"    # Google Cloud Storage
  #   path: "az://my-container/chat.lance" # Azure Blob Storage
  path: "data/chat.lance"

# Options forwarded to LanceDB's storage layer. Only needed for object storage,
# and only for values not already provided via standard cloud env vars
# (AWS_ACCESS_KEY_ID, GOOGLE_APPLICATION_CREDENTIALS, AZURE_STORAGE_ACCOUNT_NAME, ...).
# Example for an S3-compatible endpoint such as MinIO or LocalStack:
# storage:
#   endpoint: "http://localhost:4566"
#   region: "us-east-1"
#   allow_http: "true"
#   aws_access_key_id: "test"
#   aws_secret_access_key: "test"

auth:
  jwt_algorithm: "HS256"
  token_expire_minutes: 1440  # 24 hours

validation:
  username_max_length: 64
  id_max_length: 128

attachments:
  max_image_size_mb: 5
